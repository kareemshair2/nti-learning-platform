<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTI Learning Platform</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--card-hover:#243447;--accent:#38bdf8;--accent-glow:rgba(56,189,248,0.25);--text:#f8fafc;--text-sec:#cbd5e1;--text-muted:#64748b;--radius:12px;--radius-sm:8px;--trans:0.3s ease;--glass:rgba(30,41,59,0.75);--shadow:0 8px 32px rgba(0,0,0,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7;scroll-behavior:smooth}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:4px}
header{position:sticky;top:0;z-index:100;background:rgba(15,23,42,0.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(56,189,248,0.08)}
.header-inner{max-width:1280px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
header h2{font-size:1.15rem;color:var(--accent);font-weight:700;letter-spacing:-0.3px}
#backBtn{background:none;border:1px solid rgba(56,189,248,0.2);color:var(--text-sec);padding:8px 18px;border-radius:var(--radius-sm);cursor:pointer;font-size:0.85rem;transition:var(--trans);display:none;align-items:center;gap:6px}
#backBtn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.container{max-width:1280px;margin:0 auto;padding:20px 24px}
.section{display:none}
.section.active{display:block}
.btn{display:inline-block;padding:10px 22px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:0.9rem;font-weight:600;transition:var(--trans);font-family:inherit}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{background:#60c5f8;transform:translateY(-2px);box-shadow:0 4px 15px var(--accent-glow)}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn-outline:hover{background:var(--accent);color:var(--bg)}
.btn-sm{padding:6px 14px;font-size:0.8rem}

/* Home */
.hero{text-align:center;padding:60px 0 40px}
.hero h1{font-size:2.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;letter-spacing:-1px}
.hero p{font-size:1.2rem;color:var(--text-sec);max-width:600px;margin:0 auto}
.stats{display:flex;justify-content:center;gap:40px;padding:30px 0 50px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-size:2.2rem;font-weight:800;color:var(--accent)}
.stat-label{color:var(--text-muted);font-size:0.9rem;margin-top:2px}
.track-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding-bottom:50px}
.track-card{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(56,189,248,0.08);border-radius:var(--radius);padding:28px 24px;cursor:pointer;transition:var(--trans);position:relative;overflow:hidden}
.track-card:hover{transform:translateY(-6px);border-color:var(--accent);box-shadow:0 12px 40px var(--accent-glow)}
.track-card .icon-wrap{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;margin-bottom:18px}
.track-card h3{font-size:1.15rem;margin-bottom:8px}
.track-card p{color:var(--text-sec);font-size:0.9rem;margin-bottom:18px;line-height:1.6}
.track-card .track-num{position:absolute;top:16px;left:16px;font-size:0.75rem;color:var(--text-muted);font-weight:700}

/* Track View */
.track-header{text-align:center;padding:30px 0 20px}
.track-header h1{font-size:2rem;font-weight:700;margin-bottom:6px}
.track-header p{color:var(--text-sec);font-size:1rem}
.track-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:0.75rem;font-weight:600;margin-bottom:10px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:20px 0 10px;position:sticky;top:58px;z-index:50;background:var(--bg)}
.tab-btn{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--text-muted);padding:10px 18px;border-radius:var(--radius-sm);cursor:pointer;font-size:0.83rem;font-weight:500;transition:var(--trans);font-family:inherit;white-space:nowrap}
.tab-btn:hover{color:var(--text);border-color:var(--accent)}
.tab-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.tab-content{display:none;padding:20px 0}
.tab-content.active{display:block}

/* Intro Tab */
.def-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}
.def-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(255,255,255,0.04);transition:var(--trans)}
.def-card:hover{border-color:var(--accent)}
.def-card h4{color:var(--accent);margin-bottom:8px;font-size:0.95rem}
.def-card p{color:var(--text-sec);font-size:0.9rem;line-height:1.7}
.section-title{font-size:1.3rem;font-weight:700;margin:30px 0 16px;color:var(--text)}
.importance-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:20px}
.importance-item{background:var(--card);border-radius:var(--radius);padding:18px;border-left:3px solid var(--accent);transition:var(--trans)}
.importance-item:hover{transform:translateX(-4px)}
.importance-item h5{font-size:0.95rem;margin-bottom:4px}
.importance-item p{color:var(--text-sec);font-size:0.85rem}
.tag-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.tag{background:rgba(56,189,248,0.12);color:var(--accent);padding:6px 16px;border-radius:20px;font-size:0.8rem;font-weight:500;transition:var(--trans)}
.tag:hover{background:var(--accent);color:var(--bg)}
.career-table{width:100%;border-collapse:collapse;margin-bottom:20px;background:var(--card);border-radius:var(--radius);overflow:hidden}
.career-table th,.career-table td{padding:14px 18px;text-align:right;font-size:0.9rem;border-bottom:1px solid rgba(255,255,255,0.04)}
.career-table th{background:rgba(56,189,248,0.08);color:var(--accent);font-weight:600}
.career-table tr:last-child td{border-bottom:none}
.career-table tr:hover td{background:rgba(56,189,248,0.04)}
.roadmap{position:relative;padding-right:30px}
.roadmap::before{content:'';position:absolute;right:8px;top:8px;bottom:8px;width:2px;background:var(--accent);opacity:0.3}
.road-item{position:relative;margin-bottom:24px;padding-right:24px}
.road-item::before{content:'';position:absolute;right:-18px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.road-item h5{font-size:0.95rem;color:var(--accent)}
.road-item .period{color:var(--text-muted);font-size:0.8rem;margin-bottom:6px}
.road-item ul{list-style:none;display:flex;flex-wrap:wrap;gap:8px}
.road-item ul li{background:var(--card);padding:4px 12px;border-radius:6px;font-size:0.8rem;color:var(--text-sec)}

/* Modules */
.accordion{background:var(--card);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.04)}
.accordion-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;transition:var(--trans);user-select:none}
.accordion-header:hover{background:rgba(56,189,248,0.04)}
.accordion-header .title{font-weight:600;font-size:0.95rem}
.accordion-header .meta{display:flex;gap:10px;align-items:center;font-size:0.78rem;color:var(--text-muted)}
.accordion-header .icon{font-size:1.2rem;color:var(--text-muted);transition:var(--trans);margin-right:10px}
.accordion.open .accordion-header .icon{transform:rotate(180deg)}
.accordion-content{max-height:0;overflow:hidden;transition:max-height 0.4s ease;padding:0 20px}
.accordion.open .accordion-content{max-height:2000px;padding:0 20px 20px}
.accordion-content .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.detail-card{background:rgba(15,23,42,0.4);border-radius:var(--radius-sm);padding:14px}
.detail-card h6{font-size:0.82rem;color:var(--accent);margin-bottom:6px}
.detail-card p,.detail-card li{font-size:0.85rem;color:var(--text-sec)}
.detail-card ul{list-style:none;display:flex;flex-wrap:wrap;gap:6px}
.detail-card ul li{background:var(--card);padding:4px 10px;border-radius:6px;font-size:0.78rem}
.concept-tag{background:rgba(56,189,248,0.1);color:var(--accent);padding:4px 12px;border-radius:6px;font-size:0.78rem}
.tool-tag{background:rgba(139,92,246,0.12);color:#a78bfa;padding:4px 12px;border-radius:6px;font-size:0.78rem}
.summary-box{background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.12);border-radius:var(--radius-sm);padding:14px;margin-top:12px;color:var(--text-sec);font-size:0.88rem}

/* Glossary */
.gloss-controls{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.gloss-search{flex:1;min-width:200px;background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);font-size:0.9rem;font-family:inherit;transition:var(--trans)}
.gloss-search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.cat-filters{display:flex;gap:6px;flex-wrap:wrap}
.cat-btn{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--text-muted);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:0.8rem;transition:var(--trans);font-family:inherit}
.cat-btn:hover{color:var(--text);border-color:var(--accent)}
.cat-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.gloss-list{display:grid;gap:8px}
.gloss-item{background:var(--card);border-radius:var(--radius-sm);overflow:hidden;border:1px solid rgba(255,255,255,0.04)}
.gloss-item-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;transition:var(--trans)}
.gloss-item-header:hover{background:rgba(56,189,248,0.04)}
.gloss-item-header .term{font-weight:600;font-size:0.95rem}
.gloss-item-header .arabic{color:var(--text-muted);font-size:0.85rem}
.gloss-item-header .cat-badge{font-size:0.7rem;background:rgba(255,255,255,0.06);padding:2px 10px;border-radius:12px;color:var(--text-muted)}
.gloss-item .explanation{max-height:0;overflow:hidden;transition:max-height 0.3s ease;padding:0 18px;color:var(--text-sec);font-size:0.88rem;line-height:1.7}
.gloss-item.open .explanation{max-height:200px;padding:0 18px 14px}

/* Tools */
.tools-grid{display:grid;gap:14px}
.tool-card{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,0.04)}
.tool-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;transition:var(--trans)}
.tool-header:hover{background:rgba(56,189,248,0.04)}
.tool-header .tool-name{font-weight:600;font-size:0.95rem}
.tool-header .tool-desc{color:var(--text-muted);font-size:0.82rem}
.demand-badge{font-size:0.7rem;padding:2px 12px;border-radius:12px;background:rgba(16,185,129,0.15);color:#34d399}
.tool-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease;padding:0 20px}
.tool-card.open .tool-body{max-height:500px;padding:0 20px 18px}
.tool-body .trow{display:flex;gap:8px;margin-bottom:6px;font-size:0.85rem}
.tool-body .trow strong{color:var(--accent);min-width:70px}
.tool-body ul{list-style:none;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tool-body ul li{background:rgba(255,255,255,0.05);padding:3px 10px;border-radius:6px;font-size:0.78rem}
.tool-body .alt{color:var(--text-muted);font-size:0.82rem}

/* Interview */
.interview-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.interview-list{display:grid;gap:10px}
.interview-item{background:var(--card);border-radius:var(--radius-sm);padding:16px 20px;border:1px solid rgba(255,255,255,0.04)}
.interview-item .q-text{font-weight:600;font-size:0.9rem;margin-bottom:8px}
.interview-item .q-meta{display:flex;gap:10px;margin-bottom:8px;font-size:0.75rem;color:var(--text-muted)}
.diff-badge{padding:1px 10px;border-radius:10px;font-size:0.7rem}
.diff-easy{background:rgba(16,185,129,0.15);color:#34d399}
.diff-medium{background:rgba(245,158,11,0.15);color:#fbbf24}
.diff-hard{background:rgba(239,68,68,0.15);color:#f87171}
.interview-item .answer{max-height:0;overflow:hidden;transition:max-height 0.3s ease;color:var(--text-sec);font-size:0.88rem;line-height:1.7}
.interview-item.open .answer{max-height:300px;margin-top:10px}

/* Career */
.career-timeline{position:relative;padding-right:30px}
.career-timeline::before{content:'';position:absolute;right:8px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--accent),#a78bfa);opacity:0.3}
.career-item{position:relative;margin-bottom:28px;padding-right:24px}
.career-item::before{content:'';position:absolute;right:-18px;top:6px;width:14px;height:14px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);box-shadow:0 0 0 3px var(--accent-glow)}
.career-item .level-badge{font-size:0.7rem;padding:2px 14px;border-radius:12px;background:rgba(56,189,248,0.12);color:var(--accent);display:inline-block;margin-bottom:4px}
.career-item h4{font-size:1.05rem;margin-bottom:2px}
.career-item .exp{color:var(--text-muted);font-size:0.82rem;margin-bottom:2px}
.career-item .salary{color:var(--accent);font-weight:600;font-size:0.9rem;margin-bottom:8px}
.career-item .skill-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.career-item .skill-wrap span{background:rgba(139,92,246,0.12);color:#a78bfa;padding:3px 10px;border-radius:6px;font-size:0.75rem}
.career-item .cert-wrap{display:flex;flex-wrap:wrap;gap:6px}
.career-item .cert-wrap span{background:rgba(251,191,36,0.1);color:#fbbf24;padding:3px 10px;border-radius:6px;font-size:0.75rem}

/* Revision */
.rev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:30px}
.rev-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(255,255,255,0.04);transition:var(--trans)}
.rev-card:hover{border-color:var(--accent)}
.rev-card h4{color:var(--accent);font-size:0.95rem;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06)}
.rev-card ul{list-style:none}
.rev-card ul li{padding:5px 0;font-size:0.85rem;color:var(--text-sec);display:flex;align-items:center;gap:8px}
.rev-card ul li::before{content:'◆';color:var(--accent);font-size:0.5rem}
.flash-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.flash-card{perspective:600px;height:110px;cursor:pointer}
.flash-inner{position:relative;width:100%;height:100%;transition:transform 0.5s ease;transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateX(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;font-size:0.82rem;font-weight:600;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.flash-front{background:var(--card);border:1px solid rgba(56,189,248,0.12);color:var(--text)}
.flash-back{background:var(--accent);color:var(--bg);transform:rotateX(180deg)}

/* Back to top */
#backToTop{position:fixed;bottom:30px;right:30px;width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:var(--bg);font-size:1.2rem;cursor:pointer;box-shadow:0 4px 15px var(--accent-glow);transition:var(--trans);display:none;z-index:99;opacity:0;transform:translateY(10px)}
#backToTop.show{display:flex;align-items:center;justify-content:center;opacity:1;transform:translateY(0)}
#backToTop:hover{transform:translateY(-3px);box-shadow:0 6px 20px var(--accent-glow)}

/* Responsive */
@media(max-width:768px){
  .hero h1{font-size:1.8rem}
  .hero p{font-size:1rem}
  .stats{gap:24px}
  .stat-num{font-size:1.6rem}
  .track-grid{grid-template-columns:1fr}
  .def-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr !important}
  .tabs{overflow-x:auto;flex-wrap:nowrap;justify-content:flex-start;padding:14px 0;gap:4px}
  .tab-btn{font-size:0.75rem;padding:8px 12px}
  .career-table{font-size:0.8rem}
  .career-table th,.career-table td{padding:10px 12px}
  .header-inner{padding:10px 16px}
  header h2{font-size:1rem}
  #backBtn{font-size:0.78rem;padding:6px 12px}
  .container{padding:12px 16px}
  .rev-grid{grid-template-columns:1fr}
  .flash-wrap{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
}
@media(max-width:480px){
  .hero{padding:30px 0}
  .hero h1{font-size:1.4rem}
  .track-card{padding:20px 16px}
  .importance-grid{grid-template-columns:1fr}
  .tabs{gap:2px}
  .tab-btn{font-size:0.7rem;padding:6px 10px}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-inner">
      <button id="backBtn" onclick="goHome()">← الرجوع للرئيسية</button>
      <h2>NTI Learning Platform</h2>
      <div style="width:60px"></div>
    </div>
  </header>
  <main>
    <div id="homeView" class="section active"></div>
    <div id="trackView" class="section"></div>
  </main>
  <button id="backToTop" onclick="scrollToTop()" aria-label="رجوع للأعلى">↑</button>
</div>
<script src="data.js"></script>
<script>
function init(){
  window.addEventListener('hashchange', router);
  router();
  window.addEventListener('scroll', function(){
    var btn = document.getElementById('backToTop');
    if(window.scrollY > 400) btn.classList.add('show'); else btn.classList.remove('show');
  });
}

function router(){
  var hash = window.location.hash.slice(1) || 'home';
  if(hash === 'home') { showHome(); return; }
  var track = window.trackList.find(function(t){ return t.id === hash; });
  if(track) { showTrack(hash); }
  else { window.location.hash = 'home'; }
}

function showHome(){
  document.getElementById('homeView').classList.add('active');
  document.getElementById('trackView').classList.remove('active');
  document.getElementById('backBtn').style.display = 'none';
  renderHome();
}

function showTrack(id){
  document.getElementById('homeView').classList.remove('active');
  document.getElementById('trackView').classList.add('active');
  document.getElementById('backBtn').style.display = 'flex';
  renderTrackView(id);
}

function goHome(){ window.location.hash = 'home'; }

function scrollToTop(){ window.scrollTo({top:0,behavior:'smooth'}); }

function renderHome(){
  var el = document.getElementById('homeView');
  var list = window.trackList;
  var stats = [
    {num: list.length, label: 'المسارات التدريبية'},
    {num: '30+', label: 'الوحدات الدراسية'},
    {num: '200+', label: 'مفهوم ومصطلح'}
  ];
  el.innerHTML = '<div class="hero"><h1>NTI Learning Platform</h1><p>منصة التدريب الصيفي للمعهد القومي للاتصالات — دليل شامل لمساراتك التدريبية</p></div><div class="stats">' +
    stats.map(function(s){ return '<div class="stat-item"><div class="stat-num">'+s.num+'</div><div class="stat-label">'+s.label+'</div></div>'; }).join('') +
    '</div><div class="track-grid">' +
    list.map(function(t){ return '<div class="track-card" onclick="window.location.hash=\''+t.id+'\'"><div class="track-num">مسار #'+t.num+'</div><div class="icon-wrap" style="background:'+t.color+'22;color:'+t.color+'">'+(t.num < 10 ? '0'+t.num : t.num)+'</div><h3>'+t.title+'</h3><p>'+t.desc+'</p><button class="btn btn-primary btn-sm">ابدأ التعلم</button></div>'; }).join('') +
    '</div>';
}

function renderTrackView(id){
  var track = window.trackList.find(function(t){ return t.id === id; });
  if(!track) { goHome(); return; }
  var content = window.trackContent[id];
  if(!content) { goHome(); return; }
  var t = document.getElementById('trackView');
  t.innerHTML = '<div class="track-header"><span class="track-badge" style="background:'+track.color+'22;color:'+track.color+'">مسار #'+track.num+'</span><h1 style="color:'+track.color+'">'+track.title+'</h1><p>'+content.intro.subtitle+'</p></div><div class="tabs" id="tabNav">' +
    ['intro','modules','glossary','tools','interview','career','revision'].map(function(tab,i){
      var labels = ['المقدمة','الوحدات','المصطلحات','الأدوات','المقابلات','المسار الوظيفي','مراجعة سريعة'];
      return '<button class="tab-btn'+(i===0?' active':'')+'" onclick="showTab(\''+tab+'\')">'+labels[i]+'</button>';
    }).join('') +
    '</div><div id="tabContent">' +
    '<div class="tab-content active" id="tab-intro"></div>' +
    '<div class="tab-content" id="tab-modules"></div>' +
    '<div class="tab-content" id="tab-glossary"></div>' +
    '<div class="tab-content" id="tab-tools"></div>' +
    '<div class="tab-content" id="tab-interview"></div>' +
    '<div class="tab-content" id="tab-career"></div>' +
    '<div class="tab-content" id="tab-revision"></div>' +
    '</div>';
  renderIntro(content.intro);
  renderModules(content.modules);
  renderGlossary(content.glossary);
  renderTools(content.tools);
  renderInterview(content.interview);
  renderCareer(content.career);
  renderRevision(content.revision);
}

function showTab(name){
  document.querySelectorAll('.tab-content').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(el){ el.classList.remove('active'); });
  var tab = document.getElementById('tab-'+name);
  if(tab) tab.classList.add('active');
  var btns = document.querySelectorAll('.tab-btn');
  var labels = ['intro','modules','glossary','tools','interview','career','revision'];
  var idx = labels.indexOf(name);
  if(idx >= 0 && btns[idx]) btns[idx].classList.add('active');
}

function renderIntro(i){
  var el = document.getElementById('tab-intro');
  el.innerHTML = '<div class="def-grid"><div class="def-card"><h4>📖 التعريف باللغة العربية</h4><p>'+i.whatIs+'</p></div><div class="def-card"><h4>📖 Definition (English)</h4><p>'+i.whatIsEn+'</p></div></div>' +
    '<h3 class="section-title">لماذا هذا المسار مهم؟</h3><div class="importance-grid">' +
    i.importance.map(function(imp){ return '<div class="importance-item"><h5>'+imp.reason+'</h5><p>'+imp.detail+'</p></div>'; }).join('') +
    '</div><h3 class="section-title">التطبيقات والمجالات</h3><div class="tag-wrap">' +
    i.applications.map(function(a){ return '<span class="tag">'+a+'</span>'; }).join('') +
    '</div><h3 class="section-title">الفرص الوظيفية</h3><table class="career-table"><thead><tr><th>المسمى الوظيفي</th><th>الراتب (محلي)</th><th>الراتب (دولي)</th></tr></thead><tbody>' +
    i.careers.map(function(c){ return '<tr><td>'+c.title+'</td><td>'+c.salary+'</td><td>'+c.salaryInt+'</td></tr>'; }).join('') +
    '</tbody></table><h3 class="section-title">خارطة التعلم</h3><div class="roadmap">' +
    i.roadmap.map(function(r){ return '<div class="road-item"><h5>'+r.level+'</h5><div class="period">'+r.period+'</div><ul>'+r.items.map(function(it){ return '<li>'+it+'</li>'; }).join('')+'</ul></div>'; }).join('') +
    '</div>';
}

function renderModules(modules){
  var el = document.getElementById('tab-modules');
  el.innerHTML = modules.map(function(m, idx){
    return '<div class="accordion"><div class="accordion-header" onclick="toggleAccordion(this)"><div><div class="title">'+m.title+'</div><div class="meta"><span>🕒 '+m.time+'</span><span>📊 '+m.level+'</span><span>🏅 '+m.cert+'</span></div></div><span class="icon">▼</span></div><div class="accordion-content"><div class="detail-grid"><div class="detail-card"><h6>📜 نظرة عامة (عربي)</h6><p>'+m.overviewAr+'</p></div><div class="detail-card"><h6>📜 Overview (English)</h6><p>'+m.overviewEn+'</p></div><div class="detail-card"><h6>❓ لماذا هذا مهم؟</h6><p>'+m.why+'</p></div><div class="detail-card"><h6>🧠 المفاهيم الرئيسية</h6><ul>'+(m.concepts||[]).map(function(c){ return '<li class="concept-tag">'+c+'</li>'; }).join('')+'</ul></div><div class="detail-card"><h6>🛠️ الأدوات المستخدمة</h6><ul>'+(m.tools||[]).map(function(t){ return '<li class="tool-tag">'+t+'</li>'; }).join('')+'</ul></div><div class="detail-card"><h6>📋 التطبيقات</h6><ul>'+(m.applications||[]).map(function(a){ return '<li>'+a+'</li>'; }).join('')+'</ul></div><div class="detail-card"><h6>⚠️ الأخطاء الشائعة</h6><ul>'+(m.mistakes||[]).map(function(k){ return '<li>'+k+'</li>'; }).join('')+'</ul></div></div><div class="summary-box"><strong>📝 ملخص:</strong> '+m.summary+'</div></div></div>';
  }).join('');
}

function toggleAccordion(header){
  var acc = header.parentElement;
  acc.classList.toggle('open');
}

function renderGlossary(glossary){
  var el = document.getElementById('tab-glossary');
  var cats = [];
  glossary.forEach(function(g){ if(cats.indexOf(g.category)<0) cats.push(g.category); });
  el.innerHTML = '<div class="gloss-controls"><input class="gloss-search" id="glossSearch" placeholder="🔍 ابحث عن مصطلح..." oninput="filterGlossary()"><div class="cat-filters"><button class="cat-btn active" onclick="filterGlossaryCat(this,\'all\')">الكل</button>'+
    cats.map(function(c){ return '<button class="cat-btn" onclick="filterGlossaryCat(this,\''+c+'\')">'+c+'</button>'; }).join('') +
    '</div></div><div class="gloss-list" id="glossList">' +
    glossary.sort(function(a,b){ return a.term.localeCompare(b.term); }).map(function(g){
      return '<div class="gloss-item" data-term="'+g.term+'" data-cat="'+g.category+'"><div class="gloss-item-header" onclick="toggleGloss(this)"><span><span class="term">'+g.term+'</span><span class="arabic"> — '+g.arabic+'</span></span><span class="cat-badge">'+g.category+'</span></div><div class="explanation">'+g.explanation+'</div></div>';
    }).join('') +
    '</div>';
}

function toggleGloss(header){
  header.parentElement.classList.toggle('open');
}

function filterGlossary(){
  var q = document.getElementById('glossSearch').value.toLowerCase();
  document.querySelectorAll('#glossList .gloss-item').forEach(function(el){
    var term = el.getAttribute('data-term').toLowerCase();
    el.style.display = term.indexOf(q) >= 0 ? '' : 'none';
  });
}

function filterGlossaryCat(btn, cat){
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('#glossList .gloss-item').forEach(function(el){
    el.style.display = (cat === 'all' || el.getAttribute('data-cat') === cat) ? '' : 'none';
  });
}

function renderTools(tools){
  var el = document.getElementById('tab-tools');
  el.innerHTML = '<div class="tools-grid">' +
    tools.map(function(t){
      return '<div class="tool-card"><div class="tool-header" onclick="this.parentElement.classList.toggle(\'open\')"><span><span class="tool-name">'+t.name+'</span><div class="tool-desc">'+t.desc+'</div></span><span class="demand-badge">طلب '+t.demand+'</span></div><div class="tool-body"><div class="trow"><strong>متى تستخدم:</strong><span>'+t.use+'</span></div><div class="trow"><strong>المميزات:</strong></div><ul>'+(t.pros||[]).map(function(p){ return '<li>✅ '+p+'</li>'; }).join('')+'</ul><div class="trow"><strong>القيود:</strong></div><ul>'+(t.cons||[]).map(function(c){ return '<li>❌ '+c+'</li>'; }).join('')+'</ul><div class="alt"><strong>البديل:</strong> '+t.alt+'</div></div></div>';
    }).join('') +
    '</div>';
}

var interviewData = [];
var interviewType = 'all';

function renderInterview(questions){
  interviewData = questions;
  var el = document.getElementById('tab-interview');
  var types = [];
  questions.forEach(function(q){ if(types.indexOf(q.type)<0) types.push(q.type); });
  var typeLabels = {hr:'الموارد البشرية',technical:'تقنية',scenario:'سيناريوهات'};
  el.innerHTML = '<div class="interview-controls"><button class="btn btn-outline btn-sm" onclick="randomQuestion()">🎲 سؤال عشوائي</button><span style="color:var(--text-muted);font-size:0.85rem">|</span>' +
    types.map(function(t){ return '<button class="btn btn-sm cat-btn'+(t==='hr'?' active':'')+'" onclick="filterInterview(this,\''+t+'\')">'+(typeLabels[t]||t)+'</button>'; }).join('') +
    '</div><div id="interviewList" class="interview-list"></div>';
  interviewType = 'hr';
  filterInterview(document.querySelector('.cat-btn'), 'hr');
}

function filterInterview(btn, type){
  if(btn){
    document.querySelectorAll('#tab-interview .cat-btn').forEach(function(b){ b.classList.remove('active'); });
    if(btn) btn.classList.add('active');
  }
  interviewType = type;
  renderInterviewList();
}

function renderInterviewList(){
  var list = document.getElementById('interviewList');
  var qs = interviewType === 'all' ? interviewData : interviewData.filter(function(q){ return q.type === interviewType; });
  var diffLabels = {سهل:'easy',متوسط:'medium',صعب:'hard'};
  list.innerHTML = qs.map(function(q, i){
    return '<div class="interview-item"><div class="q-text">'+(i+1)+'. '+q.q+'</div><div class="q-meta"><span class="diff-badge diff-'+(diffLabels[q.difficulty]||'medium')+'">'+q.difficulty+'</span><span style="color:var(--text-muted)">'+(q.type==='hr'?'موارد بشرية':q.type==='technical'?'تقني':'سيناريو')+'</span></div><button class="btn btn-outline btn-sm" onclick="toggleAnswer(this)">🔍 إظهار الإجابة</button><div class="answer">'+q.a+'</div></div>';
  }).join('');
}

function toggleAnswer(btn){
  var item = btn.parentElement;
  item.classList.toggle('open');
  btn.textContent = item.classList.contains('open') ? '🙈 إخفاء الإجابة' : '🔍 إظهار الإجابة';
}

function randomQuestion(){
  var qs = interviewType === 'all' ? interviewData : interviewData.filter(function(q){ return q.type === interviewType; });
  if(!qs.length) return;
  var q = qs[Math.floor(Math.random() * qs.length)];
  var items = document.querySelectorAll('#interviewList .interview-item');
  items.forEach(function(el){ el.classList.remove('open'); });
  var idx = interviewData.indexOf(q);
  if(items[idx]){
    items[idx].classList.add('open');
    items[idx].scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function renderCareer(career){
  var el = document.getElementById('tab-career');
  el.innerHTML = '<div class="career-timeline">' +
    career.map(function(c){
      return '<div class="career-item"><span class="level-badge">'+c.level+'</span><h4>'+c.title+'</h4><div class="exp">📅 خبرة: '+c.exp+'</div><div class="salary">💰 '+c.salary+'</div><div><strong style="font-size:0.85rem;color:var(--text-muted)">المهارات:</strong><div class="skill-wrap">'+c.skills.map(function(s){ return '<span>'+s+'</span>'; }).join('')+'</div></div><div><strong style="font-size:0.85rem;color:var(--text-muted)">الشهادات:</strong><div class="cert-wrap">'+c.certs.map(function(s){ return '<span>'+s+'</span>'; }).join('')+'</div></div></div>';
    }).join('') +
    '</div>';
}

function renderRevision(rev){
  var el = document.getElementById('tab-revision');
  el.innerHTML = '<div class="rev-grid"><div class="rev-card"><h4>🧠 المفاهيم الأساسية</h4><ul>'+(rev.keyConcepts||[]).map(function(c){ return '<li>'+c+'</li>'; }).join('')+'</ul></div><div class="rev-card"><h4>📝 المصطلحات المهمة</h4><ul>'+(rev.importantTerms||[]).map(function(t){ return '<li>'+t+'</li>'; }).join('')+'</ul></div><div class="rev-card"><h4>🔧 أدوات لا غنى عنها</h4><ul>'+(rev.mustTools||[]).map(function(t){ return '<li>'+t+'</li>'; }).join('')+'</ul></div><div class="rev-card"><h4>💡 نقاط للمقابلات</h4><ul>'+(rev.interviewNuggets||[]).map(function(n){ return '<li>'+n+'</li>'; }).join('')+'</ul></div></div><h3 class="section-title">🃏 بطاقات المراجعة</h3><div class="flash-wrap">' +
    (rev.keyConcepts||[]).concat(rev.importantTerms||[]).slice(0,8).map(function(item){
      return '<div class="flash-card" onclick="this.classList.toggle(\'flipped\')"><div class="flash-inner"><div class="flash-front">'+item+'</div><div class="flash-back">اضغط للكشف ←</div></div></div>';
    }).join('') +
    '</div>';
}

init();
</script>
</body>
</html>
