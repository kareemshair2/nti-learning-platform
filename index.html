<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>NTI Learning Platform</title>
<style>
:root{
  --bg:#0a0e1a;
  --bg2:#0d1225;
  --card:#131a2b;
  --card-hover:#182237;
  --primary:#6c5ce7;
  --primary-light:#a29bfe;
  --primary-glow:rgba(108,92,231,0.25);
  --secondary:#00cec9;
  --secondary-glow:rgba(0,206,201,0.2);
  --text:#e8e8e8;
  --text-sec:#a0a0b0;
  --text-muted:#6b7280;
  --radius:14px;
  --radius-sm:10px;
  --trans:0.3s cubic-bezier(0.4,0,0.2,1);
  --glass:rgba(19,26,43,0.78);
  --shadow:0 8px 40px rgba(0,0,0,0.4);
  --font:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:var(--primary-light);text-decoration:none}
::selection{background:var(--primary);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-sec)}

/* Progress Bar */
#progressBar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary));z-index:999;width:0%;transition:width 0.1s linear;border-radius:0 2px 2px 0}

/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(108,92,231,0.08)}
.header-inner{max-width:1280px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
header .logo{display:flex;align-items:center;gap:10px}
header .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;font-weight:700;flex-shrink:0;box-shadow:0 4px 12px var(--primary-glow)}
header h2{font-size:1.05rem;color:var(--text);font-weight:700;letter-spacing:-0.3px}
header h2 span{color:var(--primary-light)}
#backBtn{background:rgba(108,92,231,0.1);border:1px solid rgba(108,92,231,0.2);color:var(--text-sec);padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;font-size:0.82rem;transition:var(--trans);display:none;align-items:center;gap:6px;font-family:inherit;font-weight:500}
#backBtn:hover{background:var(--primary);color:#fff;border-color:var(--primary);transform:translateX(2px);box-shadow:0 4px 16px var(--primary-glow)}

/* Container */
.container{max-width:1280px;margin:0 auto;padding:20px 24px}
.section{display:none;animation:fadeIn 0.45s ease}
.section.active{display:block}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:0.88rem;font-weight:600;transition:var(--trans);font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 4px 16px var(--primary-glow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--primary-glow)}
.btn-outline{background:transparent;border:1px solid rgba(108,92,231,0.3);color:var(--primary-light)}
.btn-outline:hover{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 16px var(--primary-glow)}
.btn-sm{padding:7px 16px;font-size:0.8rem}

/* Keyframes */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px var(--primary-glow)}50%{box-shadow:0 0 40px var(--primary-glow)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* Spinner */
.spinner{display:flex;justify-content:center;padding:40px 0}
.spinner-ring{width:36px;height:36px;border:3px solid rgba(108,92,231,0.15);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Home Hero */
.hero{text-align:center;padding:64px 0 36px;position:relative}
.hero::after{content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(108,92,231,0.06) 0%,transparent 70%);pointer-events:none}
.hero h1{font-size:2.6rem;font-weight:800;background:linear-gradient(135deg,var(--primary-light),var(--secondary),var(--primary-light));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;letter-spacing:-1px;animation:shimmer 4s ease infinite}
.hero p{font-size:1.1rem;color:var(--text-sec);max-width:620px;margin:0 auto;line-height:1.8}
.stats{display:flex;justify-content:center;gap:48px;padding:36px 0 48px;flex-wrap:wrap}
.stat-item{text-align:center;animation:slideUp 0.5s ease both}
.stat-item:nth-child(1){animation-delay:0.1s}
.stat-item:nth-child(2){animation-delay:0.2s}
.stat-item:nth-child(3){animation-delay:0.3s}
.stat-num{font-size:2.4rem;font-weight:800;background:linear-gradient(135deg,var(--primary-light),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.stat-label{color:var(--text-muted);font-size:0.88rem;margin-top:2px}

/* Track Grid */
.track-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding-bottom:60px}
.track-card{background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.04);border-radius:var(--radius);padding:28px 24px;cursor:pointer;transition:var(--trans);position:relative;overflow:hidden;animation:slideUp 0.5s ease both}
.track-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-accent,var(--primary));opacity:0;transition:var(--trans)}
.track-card:hover::before{opacity:1}
.track-card:hover{transform:translateY(-8px);border-color:var(--card-accent,var(--primary));box-shadow:0 20px 50px rgba(0,0,0,0.4),0 0 30px var(--card-glow,var(--primary-glow))}
.track-card .icon-wrap{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;margin-bottom:18px;position:relative;background:var(--card-accent-bg,rgba(108,92,231,0.12));color:var(--card-accent,var(--primary-light));transition:var(--trans)}
.track-card:hover .icon-wrap{transform:scale(1.05);box-shadow:0 0 20px var(--card-glow,var(--primary-glow))}
.track-card h3{font-size:1.15rem;margin-bottom:8px;font-weight:700}
.track-card p{color:var(--text-sec);font-size:0.88rem;margin-bottom:20px;line-height:1.65}
.track-card .track-num{position:absolute;top:16px;left:16px;font-size:0.72rem;color:var(--text-muted);font-weight:700;letter-spacing:0.5px}
.track-card .btn{opacity:0;transform:translateY(8px);transition:var(--trans)}
.track-card:hover .btn{opacity:1;transform:translateY(0)}
.track-card:nth-child(1){animation-delay:0.05s}
.track-card:nth-child(2){animation-delay:0.1s}
.track-card:nth-child(3){animation-delay:0.15s}
.track-card:nth-child(4){animation-delay:0.2s}
.track-card:nth-child(5){animation-delay:0.25s}
.track-card:nth-child(6){animation-delay:0.3s}
.track-card:nth-child(7){animation-delay:0.35s}
.track-card:nth-child(8){animation-delay:0.4s}

/* Track Header */
.track-header{text-align:center;padding:36px 0 24px;animation:fadeIn 0.5s ease}
.track-header h1{font-size:2.2rem;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px}
.track-header p{color:var(--text-sec);font-size:1rem}
.track-badge{display:inline-block;padding:5px 18px;border-radius:20px;font-size:0.75rem;font-weight:600;margin-bottom:12px;letter-spacing:0.3px}

/* Tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:20px 0 12px;position:sticky;top:60px;z-index:50;background:rgba(10,14,26,0.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.tab-btn{background:transparent;border:1px solid rgba(255,255,255,0.05);color:var(--text-muted);padding:10px 20px;border-radius:24px;cursor:pointer;font-size:0.82rem;font-weight:500;transition:var(--trans);font-family:inherit;white-space:nowrap;position:relative}
.tab-btn:hover{color:var(--text);border-color:rgba(108,92,231,0.25);background:rgba(108,92,231,0.06)}
.tab-btn.active{background:linear-gradient(135deg,var(--primary),rgba(108,92,231,0.7));color:#fff;border-color:transparent;box-shadow:0 4px 18px var(--primary-glow)}
.tab-content{display:none;padding:24px 0;animation:fadeIn 0.35s ease}
.tab-content.active{display:block}

/* Intro Tab */
.def-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
.def-card{background:var(--card);border-radius:var(--radius);padding:22px;border:1px solid rgba(255,255,255,0.04);transition:var(--trans);position:relative;overflow:hidden}
.def-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:radial-gradient(circle,rgba(108,92,231,0.06),transparent);border-radius:50%}
.def-card:hover{border-color:rgba(108,92,231,0.2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.2)}
.def-card h4{color:var(--primary-light);margin-bottom:10px;font-size:0.95rem;display:flex;align-items:center;gap:8px}
.def-card p{color:var(--text-sec);font-size:0.88rem;line-height:1.75}
.section-title{font-size:1.3rem;font-weight:700;margin:36px 0 18px;color:var(--text);display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(108,92,231,0.3),transparent)}
.importance-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:24px}
.importance-item{background:var(--card);border-radius:var(--radius);padding:20px;border-right:3px solid var(--primary);transition:var(--trans);position:relative}
.importance-item:hover{transform:translateX(-4px);border-right-color:var(--secondary);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
.importance-item h5{font-size:0.95rem;margin-bottom:6px;color:var(--text)}
.importance-item p{color:var(--text-sec);font-size:0.84rem;line-height:1.6}
.tag-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.tag{background:rgba(108,92,231,0.1);color:var(--primary-light);padding:6px 16px;border-radius:20px;font-size:0.8rem;font-weight:500;transition:var(--trans);border:1px solid transparent}
.tag:hover{background:linear-gradient(135deg,var(--primary),rgba(108,92,231,0.7));color:#fff;border-color:transparent;transform:translateY(-2px);box-shadow:0 4px 12px var(--primary-glow)}
.career-table{width:100%;border-collapse:collapse;margin-bottom:24px;background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,0.03)}
.career-table th,.career-table td{padding:14px 18px;text-align:right;font-size:0.88rem;border-bottom:1px solid rgba(255,255,255,0.04)}
.career-table th{background:rgba(108,92,231,0.08);color:var(--primary-light);font-weight:600;font-size:0.85rem}
.career-table tr:last-child td{border-bottom:none}
.career-table tr:hover td{background:rgba(108,92,231,0.03)}
.roadmap{position:relative;padding-right:30px;margin-bottom:24px}
.roadmap::before{content:'';position:absolute;right:8px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--primary),var(--secondary));opacity:0.25}
.road-item{position:relative;margin-bottom:28px;padding-right:24px;animation:fadeIn 0.4s ease both}
.road-item::before{content:'';position:absolute;right:-18px;top:6px;width:13px;height:13px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));border:2px solid var(--bg);box-shadow:0 0 0 3px var(--primary-glow);z-index:1}
.road-item h5{font-size:0.95rem;color:var(--primary-light);font-weight:700}
.road-item .period{color:var(--text-muted);font-size:0.78rem;margin-bottom:8px;letter-spacing:0.3px}
.road-item ul{list-style:none;display:flex;flex-wrap:wrap;gap:8px}
.road-item ul li{background:rgba(108,92,231,0.08);padding:5px 14px;border-radius:8px;font-size:0.8rem;color:var(--text-sec);border:1px solid rgba(108,92,231,0.06)}

/* Modules */
.accordion{background:var(--card);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.04);transition:var(--trans)}
.accordion.open{border-color:rgba(108,92,231,0.15);box-shadow:0 8px 30px rgba(0,0,0,0.15)}
.accordion-header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;cursor:pointer;transition:var(--trans);user-select:none;gap:12px}
.accordion-header:hover{background:rgba(108,92,231,0.03)}
.accordion-header .title{font-weight:600;font-size:0.95rem;color:var(--text)}
.accordion-header .meta{display:flex;gap:12px;align-items:center;font-size:0.76rem;color:var(--text-muted);margin-top:4px;flex-wrap:wrap}
.accordion-header .icon{font-size:1rem;color:var(--text-muted);transition:transform 0.35s ease,color 0.3s ease;flex-shrink:0}
.accordion.open .accordion-header .icon{transform:rotate(180deg);color:var(--primary-light)}
.accordion.open .accordion-header{background:rgba(108,92,231,0.03)}
.accordion-content{max-height:0;overflow:hidden;transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1),padding 0.35s ease;padding:0 22px}
.accordion.open .accordion-content{max-height:2400px;padding:0 22px 22px}
.accordion-content .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.detail-card{background:rgba(10,14,26,0.5);border-radius:var(--radius-sm);padding:16px;border:1px solid rgba(255,255,255,0.03);transition:var(--trans)}
.detail-card:hover{border-color:rgba(108,92,231,0.1)}
.detail-card h6{font-size:0.82rem;color:var(--primary-light);margin-bottom:8px;font-weight:600}
.detail-card p,.detail-card li{font-size:0.84rem;color:var(--text-sec);line-height:1.6}
.detail-card ul{list-style:none;display:flex;flex-wrap:wrap;gap:6px}
.detail-card ul li{background:var(--card);padding:4px 12px;border-radius:6px;font-size:0.76rem;border:1px solid rgba(255,255,255,0.03)}
.concept-tag{background:rgba(108,92,231,0.08);color:var(--primary-light);padding:4px 12px;border-radius:6px;font-size:0.76rem;border:1px solid rgba(108,92,231,0.06)!important}
.tool-tag{background:rgba(0,206,201,0.08);color:var(--secondary);padding:4px 12px;border-radius:6px;font-size:0.76rem;border:1px solid rgba(0,206,201,0.06)!important}
.summary-box{background:linear-gradient(135deg,rgba(108,92,231,0.06),rgba(0,206,201,0.04));border:1px solid rgba(108,92,231,0.1);border-radius:var(--radius-sm);padding:16px;margin-top:14px;color:var(--text-sec);font-size:0.86rem;line-height:1.7}

/* Glossary */
.gloss-controls{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.gloss-search{flex:1;min-width:200px;background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-sm);padding:12px 18px;color:var(--text);font-size:0.88rem;font-family:inherit;transition:var(--trans)}
.gloss-search:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.gloss-search::placeholder{color:var(--text-muted)}
.cat-filters{display:flex;gap:6px;flex-wrap:wrap}
.cat-btn{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--text-muted);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:0.78rem;transition:var(--trans);font-family:inherit;font-weight:500}
.cat-btn:hover{color:var(--text);border-color:rgba(108,92,231,0.25);background:rgba(108,92,231,0.06)}
.cat-btn.active{background:linear-gradient(135deg,var(--primary),rgba(108,92,231,0.7));color:#fff;border-color:transparent;box-shadow:0 4px 12px var(--primary-glow)}
.gloss-list{display:grid;gap:8px}
.gloss-item{background:var(--card);border-radius:var(--radius-sm);overflow:hidden;border:1px solid rgba(255,255,255,0.04);transition:var(--trans)}
.gloss-item.open{border-color:rgba(108,92,231,0.15)}
.gloss-item-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;transition:var(--trans);gap:10px}
.gloss-item-header:hover{background:rgba(108,92,231,0.03)}
.gloss-item-header .term{font-weight:600;font-size:0.92rem;color:var(--text);display:flex;align-items:center;gap:6px}
.gloss-item-header .term::before{content:'📖';font-size:0.8rem}
.gloss-item-header .arabic{color:var(--text-muted);font-size:0.84rem;margin-right:6px}
.gloss-item-header .cat-badge{font-size:0.68rem;background:rgba(108,92,231,0.08);padding:3px 12px;border-radius:12px;color:var(--primary-light);border:1px solid rgba(108,92,231,0.06);flex-shrink:0}
.gloss-item .explanation{max-height:0;overflow:hidden;transition:max-height 0.35s ease,padding 0.3s ease;padding:0 18px;color:var(--text-sec);font-size:0.86rem;line-height:1.7}
.gloss-item.open .explanation{max-height:200px;padding:0 18px 16px}

/* Tools */
.tools-grid{display:grid;gap:12px}
.tool-card{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,0.04);transition:var(--trans)}
.tool-card.open{border-color:rgba(108,92,231,0.15);box-shadow:0 8px 30px rgba(0,0,0,0.1)}
.tool-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;transition:var(--trans);gap:12px}
.tool-header:hover{background:rgba(108,92,231,0.03)}
.tool-header .tool-name{font-weight:600;font-size:0.94rem;color:var(--text);display:flex;align-items:center;gap:8px}
.tool-header .tool-name::before{content:'🔧';font-size:0.85rem}
.tool-header .tool-desc{color:var(--text-muted);font-size:0.8rem;margin-top:2px}
.demand-badge{font-size:0.68rem;padding:3px 14px;border-radius:12px;flex-shrink:0;font-weight:500}
.demand-badge[data-demand="مرتفع جدًا"]{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.1)}
.demand-badge[data-demand="عالي جدًا"]{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.1)}
.demand-badge[data-demand="مرتفع"]{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.1)}
.demand-badge[data-demand="عالي"]{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.1)}
.demand-badge[data-demand="متوسط-عالي"]{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.1)}
.demand-badge[data-demand="متوسط"]{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.1)}
.demand-badge[data-demand="متزايد"]{background:rgba(108,92,231,0.12);color:var(--primary-light);border:1px solid rgba(108,92,231,0.1)}
.tool-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease,padding 0.3s ease;padding:0 20px}
.tool-card.open .tool-body{max-height:600px;padding:0 20px 20px}
.tool-body .trow{display:flex;gap:8px;margin-bottom:8px;font-size:0.84rem;color:var(--text-sec)}
.tool-body .trow strong{color:var(--primary-light);min-width:70px;font-size:0.82rem}
.tool-body ul{list-style:none;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tool-body ul li{background:rgba(255,255,255,0.04);padding:4px 12px;border-radius:6px;font-size:0.78rem;color:var(--text-sec)}
.tool-body .alt{color:var(--text-muted);font-size:0.82rem;padding-top:6px;border-top:1px solid rgba(255,255,255,0.04)}

/* Interview */
.interview-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.interview-list{display:grid;gap:10px}
.interview-item{background:var(--card);border-radius:var(--radius-sm);padding:18px 20px;border:1px solid rgba(255,255,255,0.04);transition:var(--trans)}
.interview-item.open{border-color:rgba(108,92,231,0.15)}
.interview-item .q-text{font-weight:600;font-size:0.9rem;margin-bottom:10px;color:var(--text);display:flex;align-items:flex-start;gap:8px}
.interview-item .q-text::before{content:'❓';font-size:0.85rem;flex-shrink:0}
.interview-item .q-meta{display:flex;gap:12px;margin-bottom:10px;font-size:0.74rem;color:var(--text-muted);flex-wrap:wrap}
.diff-badge{padding:2px 12px;border-radius:10px;font-size:0.7rem;font-weight:500}
.diff-easy{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.1)}
.diff-medium{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.1)}
.diff-hard{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.1)}
.interview-item .answer{max-height:0;overflow:hidden;transition:max-height 0.35s ease;color:var(--text-sec);font-size:0.86rem;line-height:1.75;background:rgba(108,92,231,0.03);border-radius:var(--radius-sm);padding:0 14px;margin-top:10px}
.interview-item.open .answer{max-height:400px;padding:14px}

/* Career */
.career-timeline{position:relative;padding-right:30px;margin-bottom:24px}
.career-timeline::before{content:'';position:absolute;right:8px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--primary),var(--secondary));opacity:0.2}
.career-item{position:relative;margin-bottom:32px;padding-right:24px;animation:fadeIn 0.4s ease both}
.career-item::before{content:'';position:absolute;right:-18px;top:8px;width:15px;height:15px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));border:3px solid var(--bg);box-shadow:0 0 0 3px var(--primary-glow);z-index:1}
.career-item .level-badge{font-size:0.68rem;padding:3px 16px;border-radius:12px;background:linear-gradient(135deg,rgba(108,92,231,0.1),rgba(0,206,201,0.08));color:var(--primary-light);display:inline-block;margin-bottom:6px;font-weight:500;border:1px solid rgba(108,92,231,0.08)}
.career-item h4{font-size:1.05rem;margin-bottom:4px;font-weight:700}
.career-item .exp{color:var(--text-muted);font-size:0.8rem;margin-bottom:2px}
.career-item .salary{color:var(--secondary);font-weight:700;font-size:0.9rem;margin-bottom:10px}
.career-item .skill-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.career-item .skill-wrap span{background:rgba(108,92,231,0.08);color:var(--primary-light);padding:4px 12px;border-radius:6px;font-size:0.74rem;border:1px solid rgba(108,92,231,0.06)}
.career-item .cert-wrap{display:flex;flex-wrap:wrap;gap:6px}
.career-item .cert-wrap span{background:rgba(0,206,201,0.08);color:var(--secondary);padding:4px 12px;border-radius:6px;font-size:0.74rem;border:1px solid rgba(0,206,201,0.06)}

/* Revision */
.rev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;margin-bottom:36px}
.rev-card{background:var(--card);border-radius:var(--radius);padding:22px;border:1px solid rgba(255,255,255,0.04);transition:var(--trans);position:relative;overflow:hidden}
.rev-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary));opacity:0;transition:var(--trans)}
.rev-card:hover::before{opacity:1}
.rev-card:hover{border-color:rgba(108,92,231,0.15);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.15)}
.rev-card h4{color:var(--primary-light);font-size:0.95rem;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.04)}
.rev-card ul{list-style:none}
.rev-card ul li{padding:6px 0;font-size:0.84rem;color:var(--text-sec);display:flex;align-items:flex-start;gap:10px;line-height:1.5}
.rev-card ul li::before{content:'◆';color:var(--secondary);font-size:0.45rem;margin-top:6px;flex-shrink:0}

/* Flashcards */
.flash-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.flash-card{perspective:600px;height:120px;cursor:pointer}
.flash-inner{position:relative;width:100%;height:100%;transition:transform 0.55s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateX(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;text-align:center;padding:16px 12px;font-size:0.78rem;font-weight:600;backface-visibility:hidden;-webkit-backface-visibility:hidden;line-height:1.4}
.flash-front{background:linear-gradient(135deg,var(--card),rgba(108,92,231,0.06));border:1px solid rgba(108,92,231,0.12);color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.flash-back{background:linear-gradient(135deg,var(--primary),rgba(108,92,231,0.7));color:#fff;transform:rotateX(180deg);box-shadow:0 4px 16px var(--primary-glow)}

/* Back to Top */
#backToTop{position:fixed;bottom:30px;right:30px;width:46px;height:46px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 20px var(--primary-glow);transition:var(--trans);display:none;z-index:99;opacity:0;transform:translateY(12px);align-items:center;justify-content:center}
#backToTop.show{display:flex;opacity:1;transform:translateY(0)}
#backToTop:hover{transform:translateY(-4px);box-shadow:0 8px 30px var(--primary-glow)}

/* Gradient Separators */
.grad-sep{height:1px;background:linear-gradient(90deg,transparent,var(--primary),var(--secondary),transparent);margin:36px 0;border:none;opacity:0.4}

/* Responsive */
@media(max-width:768px){
  .hero h1{font-size:1.7rem}
  .hero p{font-size:0.95rem}
  .hero{padding:40px 0 24px}
  .stats{gap:24px;padding:24px 0 32px}
  .stat-num{font-size:1.8rem}
  .track-grid{grid-template-columns:1fr}
  .def-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr!important}
  .tabs{overflow-x:auto;flex-wrap:nowrap;justify-content:flex-start;padding:14px 0;gap:4px;top:52px}
  .tab-btn{font-size:0.73rem;padding:8px 14px}
  .career-table{font-size:0.78rem}
  .career-table th,.career-table td{padding:10px 12px}
  .header-inner{padding:10px 16px}
  header h2{font-size:0.95rem}
  header .logo-icon{width:28px;height:28px;font-size:0.85rem}
  #backBtn{font-size:0.75rem;padding:6px 12px}
  .container{padding:12px 16px}
  .rev-grid{grid-template-columns:1fr}
  .flash-wrap{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .track-card .btn{opacity:1;transform:none}
  #backToTop{bottom:20px;right:20px;width:42px;height:42px;font-size:1rem}
  .section-title{font-size:1.1rem}
}
@media(max-width:480px){
  .hero h1{font-size:1.35rem}
  .hero p{font-size:0.88rem}
  .track-card{padding:20px 16px}
  .importance-grid{grid-template-columns:1fr}
  .tabs{gap:2px}
  .tab-btn{font-size:0.68rem;padding:6px 10px}
  header h2{font-size:0.85rem}
  .track-header h1{font-size:1.5rem}
}
</style>
</head>
<body>
<div id="app">
  <div id="progressBar"></div>
  <header>
    <div class="header-inner">
      <button id="backBtn" onclick="goHome()">← الرجوع للرئيسية</button>
      <div class="logo">
        <div class="logo-icon">NT</div>
        <h2>NTI <span>Learning</span></h2>
      </div>
      <div style="width:60px"></div>
    </div>
  </header>
  <main>
    <div id="homeView" class="section active"></div>
    <div id="trackView" class="section"></div>
  </main>
  <button id="backToTop" onclick="scrollToTop()" aria-label="رجوع للأعلى">↑</button>
</div>
<script src="data.js"></script>
<script>
function init(){
  window.addEventListener('hashchange', router);
  router();
  window.addEventListener('scroll', function(){
    var btn = document.getElementById('backToTop');
    if(window.scrollY > 400) btn.classList.add('show'); else btn.classList.remove('show');
    var bar = document.getElementById('progressBar');
    var h = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = h > 0 ? (window.scrollY / h * 100) + '%' : '0%';
  });
}

function router(){
  var hash = window.location.hash.slice(1) || 'home';
  if(hash === 'home') { showHome(); return; }
  var track = window.trackList.find(function(t){ return t.id === hash; });
  if(track) { showTrack(hash); }
  else { window.location.hash = 'home'; }
}

function showHome(){
  document.getElementById('homeView').classList.add('active');
  document.getElementById('trackView').classList.remove('active');
  document.getElementById('backBtn').style.display = 'none';
  renderHome();
}

function showTrack(id){
  document.getElementById('homeView').classList.remove('active');
  document.getElementById('trackView').classList.add('active');
  document.getElementById('backBtn').style.display = 'flex';
  renderTrackView(id);
}

function goHome(){ window.location.hash = 'home'; }

function scrollToTop(){ window.scrollTo({top:0,behavior:'smooth'}); }

function renderHome(){
  var el = document.getElementById('homeView');
  var list = window.trackList;
  var stats = [
    {num: list.length, label: 'المسارات التدريبية'},
    {num: '30+', label: 'الوحدات الدراسية'},
    {num: '200+', label: 'مفهوم ومصطلح'}
  ];
  el.innerHTML = '<div class="hero"><h1>NTI Learning Platform</h1><p>منصة التدريب الصيفي للمعهد القومي للاتصالات — دليل شامل لمساراتك التدريبية</p></div><div class="stats">' +
    stats.map(function(s){ return '<div class="stat-item"><div class="stat-num">'+s.num+'</div><div class="stat-label">'+s.label+'</div></div>'; }).join('') +
    '</div><div class="track-grid">' +
    list.map(function(t){ return '<div class="track-card" onclick="window.location.hash=\''+t.id+'\'" style="--card-accent:'+t.color+';--card-accent-bg:'+t.color+'18;--card-glow:'+t.color+'33"><div class="track-num">مسار #'+t.num+'</div><div class="icon-wrap">'+(t.num < 10 ? '0'+t.num : t.num)+'</div><h3>'+t.title+'</h3><p>'+t.desc+'</p><button class="btn btn-primary btn-sm">ابدأ التعلم</button></div>'; }).join('') +
    '</div>';
}

function renderTrackView(id){
  var track = window.trackList.find(function(t){ return t.id === id; });
  if(!track) { goHome(); return; }
  var content = window.trackContent[id];
  if(!content) { goHome(); return; }
  var t = document.getElementById('trackView');
  t.innerHTML = '<div class="track-header"><span class="track-badge" style="background:'+track.color+'18;color:'+track.color+';border:1px solid '+track.color+'22">مسار #'+track.num+'</span><h1 style="color:'+track.color+'">'+track.title+'</h1><p>'+content.intro.subtitle+'</p></div><div class="tabs" id="tabNav">' +
    ['intro','modules','glossary','tools','interview','career','revision'].map(function(tab,i){
      var labels = ['المقدمة','الوحدات','المصطلحات','الأدوات','المقابلات','المسار الوظيفي','مراجعة سريعة'];
      return '<button class="tab-btn'+(i===0?' active':'')+'" onclick="showTab(\''+tab+'\')">'+labels[i]+'</button>';
    }).join('') +
    '</div><div id="tabContent">' +
    '<div class="tab-content active" id="tab-intro"></div>' +
    '<div class="tab-content" id="tab-modules"></div>' +
    '<div class="tab-content" id="tab-glossary"></div>' +
    '<div class="tab-content" id="tab-tools"></div>' +
    '<div class="tab-content" id="tab-interview"></div>' +
    '<div class="tab-content" id="tab-career"></div>' +
    '<div class="tab-content" id="tab-revision"></div>' +
    '</div>';
  renderIntro(content.intro);
  renderModules(content.modules);
  renderGlossary(content.glossary);
  renderTools(content.tools);
  renderInterview(content.interview);
  renderCareer(content.career);
  renderRevision(content.revision);
}

function showTab(name){
  document.querySelectorAll('.tab-content').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(el){ el.classList.remove('active'); });
  var tab = document.getElementById('tab-'+name);
  if(tab) tab.classList.add('active');
  var btns = document.querySelectorAll('.tab-btn');
  var labels = ['intro','modules','glossary','tools','interview','career','revision'];
  var idx = labels.indexOf(name);
  if(idx >= 0 && btns[idx]) btns[idx].classList.add('active');
}

function renderIntro(i){
  var el = document.getElementById('tab-intro');
  el.innerHTML = '<div class="def-grid"><div class="def-card"><h4>📖 التعريف باللغة العربية</h4><p>'+i.whatIs+'</p></div><div class="def-card"><h4>📖 Definition (English)</h4><p>'+i.whatIsEn+'</p></div></div>' +
    '<h3 class="section-title">لماذا هذا المسار مهم؟</h3><div class="importance-grid">' +
    i.importance.map(function(imp){ return '<div class="importance-item"><h5>'+imp.reason+'</h5><p>'+imp.detail+'</p></div>'; }).join('') +
    '</div><h3 class="section-title">التطبيقات والمجالات</h3><div class="tag-wrap">' +
    i.applications.map(function(a){ return '<span class="tag">'+a+'</span>'; }).join('') +
    '</div><h3 class="section-title">الفرص الوظيفية</h3><table class="career-table"><thead><tr><th>المسمى الوظيفي</th><th>الراتب (محلي)</th><th>الراتب (دولي)</th></tr></thead><tbody>' +
    i.careers.map(function(c){ return '<tr><td>'+c.title+'</td><td>'+c.salary+'</td><td>'+c.salaryInt+'</td></tr>'; }).join('') +
    '</tbody></table><h3 class="section-title">خارطة التعلم</h3><div class="roadmap">' +
    i.roadmap.map(function(r){ return '<div class="road-item"><h5>'+r.level+'</h5><div class="period">'+r.period+'</div><ul>'+r.items.map(function(it){ return '<li>'+it+'</li>'; }).join('')+'</ul></div>'; }).join('') +
    '</div>';
}

function renderModules(modules){
  var el = document.getElementById('tab-modules');
  el.innerHTML = modules.map(function(m, idx){
    return '<div class="accordion"><div class="accordion-header" onclick="toggleAccordion(this)"><div><div class="title">'+m.title+'</div><div class="meta"><span>🕒 '+m.time+'</span><span>📊 '+m.level+'</span><span>🏅 '+m.cert+'</span></div></div><span class="icon">▼</span></div><div class="accordion-content"><div class="detail-grid"><div class="detail-card"><h6>📜 نظرة عامة (عربي)</h6><p>'+m.overviewAr+'</p></div><div class="detail-card"><h6>📜 Overview (English)</h6><p>'+m.overviewEn+'</p></div><div class="detail-card"><h6>❓ لماذا هذا مهم؟</h6><p>'+m.why+'</p></div><div class="detail-card"><h6>🧠 المفاهيم الرئيسية</h6><ul>'+(m.concepts||[]).map(function(c){ return '<li class="concept-tag">'+c+'</li>'; }).join('')+'</ul></div><div class="detail-card"><h6>🛠️ الأدوات المستخدمة</h6><ul>'+(m.tools||[]).map(function(t){ return '<li class="tool-tag">'+t+'</li>'; }).join('')+'</ul></div><div class="detail-card"><h6>📋 التطبيقات</h6><ul>'+(m.applications||[]).map(function(a){ return '<li>'+a+'</li>'; }).join('')+'</ul></div><div class="detail-card"><h6>⚠️ الأخطاء الشائعة</h6><ul>'+(m.mistakes||[]).map(function(k){ return '<li>'+k+'</li>'; }).join('')+'</ul></div></div><div class="summary-box"><strong>📝 ملخص:</strong> '+m.summary+'</div></div></div>';
  }).join('');
}

function toggleAccordion(header){
  var acc = header.parentElement;
  acc.classList.toggle('open');
}

function renderGlossary(glossary){
  var el = document.getElementById('tab-glossary');
  var cats = [];
  glossary.forEach(function(g){ if(cats.indexOf(g.category)<0) cats.push(g.category); });
  el.innerHTML = '<div class="gloss-controls"><input class="gloss-search" id="glossSearch" placeholder="🔍 ابحث عن مصطلح..." oninput="filterGlossary()"><div class="cat-filters"><button class="cat-btn active" onclick="filterGlossaryCat(this,\'all\')">الكل</button>'+
    cats.map(function(c){ return '<button class="cat-btn" onclick="filterGlossaryCat(this,\''+c+'\')">'+c+'</button>'; }).join('') +
    '</div></div><div class="gloss-list" id="glossList">' +
    glossary.sort(function(a,b){ return a.term.localeCompare(b.term); }).map(function(g){
      return '<div class="gloss-item" data-term="'+g.term+'" data-cat="'+g.category+'"><div class="gloss-item-header" onclick="toggleGloss(this)"><span><span class="term">'+g.term+'</span><span class="arabic"> — '+g.arabic+'</span></span><span class="cat-badge">'+g.category+'</span></div><div class="explanation">'+g.explanation+'</div></div>';
    }).join('') +
    '</div>';
}

function toggleGloss(header){
  header.parentElement.classList.toggle('open');
}

function filterGlossary(){
  var q = document.getElementById('glossSearch').value.toLowerCase();
  document.querySelectorAll('#glossList .gloss-item').forEach(function(el){
    var term = el.getAttribute('data-term').toLowerCase();
    el.style.display = term.indexOf(q) >= 0 ? '' : 'none';
  });
}

function filterGlossaryCat(btn, cat){
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('#glossList .gloss-item').forEach(function(el){
    el.style.display = (cat === 'all' || el.getAttribute('data-cat') === cat) ? '' : 'none';
  });
}

function renderTools(tools){
  var el = document.getElementById('tab-tools');
  el.innerHTML = '<div class="tools-grid">' +
    tools.map(function(t){
      return '<div class="tool-card"><div class="tool-header" onclick="this.parentElement.classList.toggle(\'open\')"><span><span class="tool-name">'+t.name+'</span><div class="tool-desc">'+t.desc+'</div></span><span class="demand-badge" data-demand="'+t.demand+'">طلب '+t.demand+'</span></div><div class="tool-body"><div class="trow"><strong>متى تستخدم:</strong><span>'+t.use+'</span></div><div class="trow"><strong>المميزات:</strong></div><ul>'+(t.pros||[]).map(function(p){ return '<li>✅ '+p+'</li>'; }).join('')+'</ul><div class="trow"><strong>القيود:</strong></div><ul>'+(t.cons||[]).map(function(c){ return '<li>❌ '+c+'</li>'; }).join('')+'</ul><div class="alt"><strong>البديل:</strong> '+t.alt+'</div></div></div>';
    }).join('') +
    '</div>';
}

var interviewData = [];
var interviewType = 'all';

function renderInterview(questions){
  interviewData = questions;
  var el = document.getElementById('tab-interview');
  var types = [];
  questions.forEach(function(q){ if(types.indexOf(q.type)<0) types.push(q.type); });
  var typeLabels = {hr:'الموارد البشرية',technical:'تقنية',scenario:'سيناريوهات'};
  el.innerHTML = '<div class="interview-controls"><button class="btn btn-outline btn-sm" onclick="randomQuestion()">🎲 سؤال عشوائي</button><span style="color:var(--text-muted);font-size:0.85rem">|</span>' +
    types.map(function(t){ return '<button class="btn btn-sm cat-btn'+(t==='hr'?' active':'')+'" onclick="filterInterview(this,\''+t+'\')">'+(typeLabels[t]||t)+'</button>'; }).join('') +
    '</div><div id="interviewList" class="interview-list"></div>';
  interviewType = 'hr';
  filterInterview(document.querySelector('.cat-btn'), 'hr');
}

function filterInterview(btn, type){
  if(btn){
    document.querySelectorAll('#tab-interview .cat-btn').forEach(function(b){ b.classList.remove('active'); });
    if(btn) btn.classList.add('active');
  }
  interviewType = type;
  renderInterviewList();
}

function renderInterviewList(){
  var list = document.getElementById('interviewList');
  var qs = interviewType === 'all' ? interviewData : interviewData.filter(function(q){ return q.type === interviewType; });
  var diffLabels = {سهل:'easy',متوسط:'medium',صعب:'hard'};
  list.innerHTML = qs.map(function(q, i){
    return '<div class="interview-item"><div class="q-text">'+(i+1)+'. '+q.q+'</div><div class="q-meta"><span class="diff-badge diff-'+(diffLabels[q.difficulty]||'medium')+'">'+q.difficulty+'</span><span style="color:var(--text-muted)">'+(q.type==='hr'?'موارد بشرية':q.type==='technical'?'تقني':'سيناريو')+'</span></div><button class="btn btn-outline btn-sm" onclick="toggleAnswer(this)">🔍 إظهار الإجابة</button><div class="answer">'+q.a+'</div></div>';
  }).join('');
}

function toggleAnswer(btn){
  var item = btn.parentElement;
  item.classList.toggle('open');
  btn.textContent = item.classList.contains('open') ? '🙈 إخفاء الإجابة' : '🔍 إظهار الإجابة';
}

function randomQuestion(){
  var qs = interviewType === 'all' ? interviewData : interviewData.filter(function(q){ return q.type === interviewType; });
  if(!qs.length) return;
  var q = qs[Math.floor(Math.random() * qs.length)];
  var items = document.querySelectorAll('#interviewList .interview-item');
  items.forEach(function(el){ el.classList.remove('open'); });
  var idx = interviewData.indexOf(q);
  if(items[idx]){
    items[idx].classList.add('open');
    items[idx].scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function renderCareer(career){
  var el = document.getElementById('tab-career');
  el.innerHTML = '<div class="career-timeline">' +
    career.map(function(c){
      return '<div class="career-item"><span class="level-badge">'+c.level+'</span><h4>'+c.title+'</h4><div class="exp">📅 خبرة: '+c.exp+'</div><div class="salary">💰 '+c.salary+'</div><div><strong style="font-size:0.85rem;color:var(--text-muted)">المهارات:</strong><div class="skill-wrap">'+c.skills.map(function(s){ return '<span>'+s+'</span>'; }).join('')+'</div></div><div><strong style="font-size:0.85rem;color:var(--text-muted)">الشهادات:</strong><div class="cert-wrap">'+c.certs.map(function(s){ return '<span>'+s+'</span>'; }).join('')+'</div></div></div>';
    }).join('') +
    '</div>';
}

function renderRevision(rev){
  var el = document.getElementById('tab-revision');
  el.innerHTML = '<div class="rev-grid"><div class="rev-card"><h4>🧠 المفاهيم الأساسية</h4><ul>'+(rev.keyConcepts||[]).map(function(c){ return '<li>'+c+'</li>'; }).join('')+'</ul></div><div class="rev-card"><h4>📝 المصطلحات المهمة</h4><ul>'+(rev.importantTerms||[]).map(function(t){ return '<li>'+t+'</li>'; }).join('')+'</ul></div><div class="rev-card"><h4>🔧 أدوات لا غنى عنها</h4><ul>'+(rev.mustTools||[]).map(function(t){ return '<li>'+t+'</li>'; }).join('')+'</ul></div><div class="rev-card"><h4>💡 نقاط للمقابلات</h4><ul>'+(rev.interviewNuggets||[]).map(function(n){ return '<li>'+n+'</li>'; }).join('')+'</ul></div></div><h3 class="section-title">🃏 بطاقات المراجعة</h3><div class="flash-wrap">' +
    (rev.keyConcepts||[]).concat(rev.importantTerms||[]).slice(0,8).map(function(item){
      return '<div class="flash-card" onclick="this.classList.toggle(\'flipped\')"><div class="flash-inner"><div class="flash-front">'+item+'</div><div class="flash-back">اضغط للكشف ←</div></div></div>';
    }).join('') +
    '</div>';
}

init();
</script>
</body>
</html>
